version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: jira_app
    volumes:
      - .:/var/www
    working_dir: /var/www
    depends_on:
      - db

  vite:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: jira_vite
    volumes:
      - .:/var/www
    working_dir: /var/www
    ports:
      - "5173:5173"
    command: sh -c "yarn install && yarn dev"

  nginx:
    image: nginx:latest
    container_name: jira_nginx
    ports:
      - "8036:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:15
    container_name: jira_db
    environment:
      POSTGRES_DB: jira
      POSTGRES_USER: jira
      POSTGRES_PASSWORD: secret
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: